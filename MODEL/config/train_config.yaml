data:
  input_path: "Final Raw Data.xlsx"
  sheet_name: null
  reference_date: "2026-04-21"

features:
  group_column: "Account"
  row_id_column: "Creditline"
  target_column: "Target"
  id_columns:
    - "S/N"
    - "Account"
    - "Creditline"
  leakage_columns:
    - "Class"
    - "DaysInArrears"
  optional_exclude_columns:
    - "Principal Arrears"
    - "InterestArrears"
  use_optional_exclusions: true

training:
  test_size: 0.2
  random_state: 42
  n_estimators: 300
  min_samples_leaf: 8
  benchmark_models:
    - "logistic_regression"
    - "decision_tree"
    - "random_forest"
    - "extra_trees"
  promoted_model: "random_forest"

explanations:
  shap_top_features: 5
  max_background_rows: 200
  max_explained_rows: 250

outputs:
  base_dir: "outputs"
